<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARAKU LINK HUB</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      image-rendering: pixelated;
    }
  </style>
</head>

<body class="min-h-screen bg-black text-white font-mono overflow-x-hidden">

  <!-- background grid -->
  <div class="absolute inset-0 opacity-20">
    <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.06)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.06)_1px,transparent_1px)] bg-[size:28px_28px]"></div>
  </div>

  <!-- glow -->
  <div class="absolute top-0 left-0 w-72 h-72 bg-pink-500/20 blur-3xl rounded-full"></div>
  <div class="absolute bottom-0 right-0 w-80 h-80 bg-cyan-500/20 blur-3xl rounded-full"></div>

  <main class="relative z-10 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md border-4 border-white bg-zinc-950 rounded-3xl overflow-hidden shadow-[0_0_30px_rgba(255,255,255,0.15)]">

      <!-- top bar -->
      <div class="h-3 bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-400"></div>

      <div class="p-6">

        <!-- avatar -->
        <div class="flex flex-col items-center text-center mb-6">
          <div class="w-28 h-28 border-4 border-white rounded-2xl bg-zinc-900 flex items-center justify-center text-5xl">
            🎴
          </div>

          <h1 class="text-4xl font-black text-pink-400 mt-4 tracking-widest">
            ARAKU
          </h1>

          <p class="text-sm text-zinc-300 mt-2">
            manga vibe + pixel life + real life bug
          </p>
        </div>

        <!-- quest -->
        <div class="border-2 border-zinc-700 bg-black rounded-2xl p-4 mb-6">
          <p class="text-cyan-400 text-xs mb-2 tracking-widest">QUEST LOG</p>
          <p class="text-sm text-zinc-300">▸ bikin manga</p>
          <p class="text-sm text-zinc-300">▸ survive hidup</p>
          <p class="text-sm text-zinc-300">▸ cari duit dari gambar</p>
        </div>

        <!-- links -->
        <div class="space-y-3">

          <a href="https://tiktok.com" class="block border-2 border-zinc-700 rounded-xl p-4 bg-zinc-900 hover:border-white transition">
            ▶ TikTok @arakuu
          </a>

          <a href="https://instagram.com" class="block border-2 border-zinc-700 rounded-xl p-4 bg-zinc-900 hover:border-white transition">
            ◎ Instagram @arakuu.art
          </a>

          <a href="https://youtube.com" class="block border-2 border-zinc-700 rounded-xl p-4 bg-zinc-900 hover:border-white transition">
            ▣ YouTube Araku
          </a>

          <a href="https://saweria.co" class="block border-2 border-zinc-700 rounded-xl p-4 bg-zinc-900 hover:border-white transition">
            ♥ Saweria Support
          </a>

        </div>

        <p class="text-xs text-zinc-500 text-center mt-6">
          made with overthinking + pixel dreams
        </p>

      </div>
    </div>

  </main>

</body>
</html>
